# STEWIE frontend — static UI + API reverse proxy
server {
    listen 80;
    client_max_body_size 4m;                 # mirrors the backend's DUSTGYM_MAX_BODY_BYTES cap
    root /usr/share/nginx/html;

    # no-cache: the cockpit iterates fast; browsers must revalidate (stale-UI reports 2026-06-10)
    location = /            { add_header Cache-Control "no-cache"; try_files /index.html =404; }
    location = /index.html  { add_header Cache-Control "no-cache"; try_files /index.html =404; }
    location = /bodies.json { add_header Cache-Control "no-cache"; try_files /bodies.json =404; }

    location / {                              # everything else -> the API
        proxy_pass http://backend:8770;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;              # /plan renders a PDF report
    }
}
