# STEWIE production deployment — `docker compose -f deploy/compose.yml up -d`
# Frontend on :8000 (UI + proxy), backend internal. Reports persist in the stewie-data volume.
name: stewie
services:
  backend:
    build: { context: .., dockerfile: deploy/Dockerfile.backend, network: host }
    env_file:
      - path: ./.env
        required: false                 # generated locally (gitignored); shell env still overrides
    environment:
      # C-01: REQUIRED. The server fails closed without it, so the deploy must fail loudly rather than
      # boot silently director-open. Set STEWIE_API_KEY (or DUSTGYM_API_KEY) in deploy/.env or the shell.
      # (Local dev without a key uses `dustgym-serve` + STEWIE_DEV_OPEN=1 on loopback, NOT this compose.)
      STEWIE_API_KEY: ${STEWIE_API_KEY:-${DUSTGYM_API_KEY:?set STEWIE_API_KEY or DUSTGYM_API_KEY; the server fails closed without it (audit C-01)}}
      STEWIE_CORS_ORIGINS: ${STEWIE_CORS_ORIGINS:-}
      STEWIE_REPORTS_TTL_S: ${STEWIE_REPORTS_TTL_S:-604800}
      MPLCONFIGDIR: /tmp/mpl
    volumes: [ "stewie-data:/data" ]
    restart: unless-stopped
    # hardening: minimal caps, no privilege escalation, immutable rootfs (writes only to /data + /tmp)
    cap_drop: [ "ALL" ]
    security_opt: [ "no-new-privileges:true" ]
    read_only: true
    tmpfs: [ "/tmp" ]
  frontend:
    build: { context: .., dockerfile: deploy/Dockerfile.frontend, network: host }
    ports: [ "8000:80" ]
    cap_drop: [ "ALL" ]
    cap_add: [ "CHOWN", "SETGID", "SETUID", "NET_BIND_SERVICE" ]   # nginx master needs these
    security_opt: [ "no-new-privileges:true" ]
    depends_on:
      backend: { condition: service_healthy }
    restart: unless-stopped
  # B1: the ROS2 teleop/nav service (John's CCSDS demo + the B1.6 Twist teleop). Heavy image
  # (osrf/ros:jazzy-desktop) -> opt-in via the 'ros2' profile: docker compose --profile ros2 up -d
  ros2:
    profiles: [ "ros2" ]
    build: { context: ../scripts/ccsds_ros_nav, dockerfile: Dockerfile, network: host }
    network_mode: host                     # ROS2 DDS discovery wants host networking for teleop tools
    volumes: [ "..:/work:ro", "stewie-data:/data" ]
    environment:
      MPLBACKEND: Agg
    command: ["bash", "-lc", "source /opt/ros/jazzy/setup.bash && python3 /work/scripts/ccsds_ros_nav/nodes/rover_executive_node.py"]
    restart: unless-stopped

volumes:
  stewie-data:
