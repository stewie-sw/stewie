# STEWIE production deployment — `docker compose -f deploy/compose.yml up -d`
# Frontend on :8000 (UI + proxy), backend internal. Reports persist in the stewie-data volume.
name: stewie
services:
  backend:
    build: { context: .., dockerfile: deploy/Dockerfile.backend, network: host }
    environment:
      STEWIE_API_KEY: ${STEWIE_API_KEY:-${DUSTGYM_API_KEY:-}}          # set to require auth on mutating routes
      STEWIE_CORS_ORIGINS: ${STEWIE_CORS_ORIGINS:-}
      STEWIE_REPORTS_TTL_S: ${STEWIE_REPORTS_TTL_S:-604800}
      MPLCONFIGDIR: /tmp/mpl
    volumes: [ "stewie-data:/data" ]
    restart: unless-stopped
    # hardening: minimal caps, no privilege escalation, immutable rootfs (writes only to /data + /tmp)
    cap_drop: [ "ALL" ]
    security_opt: [ "no-new-privileges:true" ]
    read_only: true
    tmpfs: [ "/tmp" ]
  frontend:
    build: { context: .., dockerfile: deploy/Dockerfile.frontend, network: host }
    ports: [ "8000:80" ]
    cap_drop: [ "ALL" ]
    cap_add: [ "CHOWN", "SETGID", "SETUID", "NET_BIND_SERVICE" ]   # nginx master needs these
    security_opt: [ "no-new-privileges:true" ]
    depends_on:
      backend: { condition: service_healthy }
    restart: unless-stopped
volumes:
  stewie-data:
