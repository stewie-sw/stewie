# DustGym requirement status manifest — the machine-readable status source for PRD v6.0.
#
# Per the gap analysis: status is GENERATED from this checked-in manifest, not hand-duplicated as
# checkmarks across the PRD. Each row carries the four PRD §3 columns (I/X/V/Q), an owner, the source
# module/API, the acceptance test id, the evidence commit, blocking deps, and a last-verified date.
#
# Status values (PRD §3): D done · P partial · N not done · G externally gated · NA not applicable.
# Columns: I implementation · X integration (product path uses it) · V verification (automated
# acceptance) · Q qualification (real data/hardware/deploy evidence).
#
# This manifest is populated INCREMENTALLY: a requirement row is added the first time it is actively
# tracked (release blockers + Phase-0 + the rows under current work first). It is not yet exhaustive
# over all of PRD §7; rows are added as their work packages start. `owner: unassigned` and
# `evidence: ""` are truthful states, not placeholders.
schema_version: 1
prd_version: "6.0"
status_values: [D, P, N, G, NA]
priorities: [P0, P1, P2, P3]
columns: [I, X, V, Q]

