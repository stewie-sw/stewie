# CI workflow (PRD N9) -- ready to activate.
# Move this file to .github/workflows/ci.yml (needs a git token with the 'workflow' scope).
# The dustgym repo already has publish-dustgym.yml; this adds the test+lint gate the publish job should depend on.

name: CI

# PRD N9: the test + lint gate. Runs on every push and PR; the publish workflow should depend on this.
# GPU / Godot / COLMAP / Chrono tests skip cleanly (importorskip / skip-if-no-artifact) on the CPU runner.

on:
  push:
  pull_request:

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint (ruff, pyflakes gate)
        run: ruff check --select F terrain_authority planet_browser dustgym scripts viz
      - name: Test (numpy core + planner; gated tiers skip)
        run: pytest terrain_authority planet_browser
