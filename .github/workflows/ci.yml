name: CI

# PRD N9: the test + lint gate. Runs on every push and PR; the publish workflow should depend on this.
# GPU / Godot / COLMAP / Chrono tests skip cleanly (importorskip / skip-if-no-artifact) on the CPU runner.

on:
  push:
  pull_request:

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint (ruff, pyflakes gate)
        run: ruff check --select F terrain_authority planet_browser dustgym scripts viz
      - name: Type check (mypy; mission-planner + core enforced, sim modules ratcheted in pyproject)
        run: mypy
      - name: Test + coverage gate (numpy core + planner; gated tiers skip)
        run: pytest terrain_authority planet_browser --cov --cov-report=term-missing
