name: CI

# PRD N9/PO-04: the test + lint gate. Runs on every push and PR; the publish workflow depends on the
# same gate. GPU / Godot / COLMAP / Chrono / ROS tests skip cleanly (importorskip / skip-if-no-artifact)
# on the CPU runner. Structured as: lint + type + the coverage gate ONCE (py3.11), and the configured
# test suite across the remaining supported Python versions in parallel (faster wall-clock, pip-cached).

on:
  push:
  pull_request:

jobs:
  lint-type-cov:
    name: lint + type + coverage gate (py3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Requirements traceability (PRD 19.2 -- V=D must be test-cited)
        run: python scripts/req_trace.py
      - name: Lint (ruff, pyflakes gate)
        run: ruff check --select F stewie dart lode leap forge dustgym scripts viz
      - name: Type check (mypy; mission-planner + core enforced, sim modules ratcheted in pyproject)
        run: mypy
      - name: Test + coverage gate (the CONFIGURED suite; testpaths = core + planner + scripts)
        run: pytest --cov --cov-report=term-missing

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]   # 3.11 is covered by the lint-type-cov job
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Test (the CONFIGURED suite; gated tiers skip)
        run: pytest -p no:cacheprovider
