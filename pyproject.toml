[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "dustgym"
version = "0.1.0"
description = "Gymnasium environments for off-world surface vehicles and autonomous construction, on a mass-conserving terramechanics authority parameterized per planetary body (Moon/Mars/Earth/...). IPEx / Lunar Autonomy Challenge lineage."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [
    { name = "John McCardle" },   # terrain_authority terramechanics + WorkSite (CC0 core)
    { name = "Aaron Storey" },    # dustgym Gymnasium suite, per-planet bodies, RL/scheduling
]
keywords = ["gymnasium", "reinforcement-learning", "planetary", "lunar", "mars", "rover", "terramechanics", "regolith", "isru", "robotics"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Framework :: Robot Framework",
    "Intended Audience :: Science/Research",
]
dependencies = [
    "numpy>=1.21,<3",
    "scipy>=1.7,<2",
    "gymnasium>=0.29,<2",
    "tomli>=1.1.0; python_version < '3.11'",   # DUSTGYM_CONFIG TOML overlay (stdlib tomllib on >=3.11)
]

[project.optional-dependencies]
rl = ["torch<3", "stable-baselines3>=2.0,<3"]          # PPO / model-free baselines
planner = ["matplotlib", "pyproj"]                     # the mission-planner product: report figures + non-polar DEM reproject
server = ["fastapi>=0.110,<1", "uvicorn>=0.20,<1"]     # the ASGI planner server (dustgym-serve; PRD N7/N8)
dev = ["pytest>=7", "pytest-cov>=4", "ruff>=0.6", "matplotlib", "pyproj", "fastapi>=0.110,<1", "uvicorn>=0.20,<1", "httpx>=0.24"]   # test deps (planner + server; CI installs .[dev])

[project.urls]
Homepage = "https://github.com/dustgym/dustgym"
Source = "https://github.com/dustgym/dustgym"
"Core physics provenance" = "https://github.com/jmccardle/roversim"

# Forward-compatible Gymnasium plugin hook (for versions that auto-load entry points). Current
# Gymnasium needs `import dustgym` (registers on import) before `gymnasium.make("Dust/...")`.
[project.entry-points."gymnasium.envs"]
Dust = "dustgym:register_envs"

# The mission-planner product server (PRD N13): `dustgym-serve` -> the planner + mission-control report API.
[project.scripts]
dustgym-serve = "planet_browser.server:main"

[tool.setuptools]
packages = ["terrain_authority", "dustgym", "planet_browser"]

[tool.setuptools.package-data]
# ship the planner's web UI + per-body config + the real-DEM ingest fixtures with the wheel
planet_browser = ["*.html", "*.json", "fixtures/*"]

# --- quality + test config (PRD N11) ---------------------------------------------------------------
[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
# Enforced standard: pyflakes (F) -- unused imports/vars, undefined names, f-string/format errors.
# The broader style rules (E/W line-length etc.) are intentionally advisory, not gated.
select = ["F"]

[tool.pytest.ini_options]
testpaths = ["terrain_authority", "planet_browser"]
addopts = "-q"
markers = [
    "gpu: needs a GPU (Vulkan/CUDA)",
    "godot: needs the Godot sidecar binary",
    "colmap: needs pycolmap",
    "chrono: needs pychrono",
]

# --- coverage (PRD N11): measure SOURCE only (test files excluded), CLI mains excluded ------------
[tool.coverage.run]
source = ["terrain_authority", "planet_browser"]
omit = [
    "*/test_*.py",
    "*/tests.py",
    "*/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@(abc\\.)?abstractmethod",
]
show_missing = true
precision = 1
# Gate (PRD N11): the suite covers ~94% of source; 85 leaves headroom while blocking regressions.
# (dem_import's raw-GeoTIFF byte-parser is uncoverable here -- the source .tif is not committed, only
#  its processed products, so fabricating one would violate the no-synthetic-data rule.)
fail_under = 85
